kind = "web"
previewPath = "/"
title = "Petal Soft Wishes"
version = "1.0.0"
id = "artifacts/petal-soft-wishes"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21891

[services.development]
run = "pnpm --filter @workspace/petal-soft-wishes run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/petal-soft-wishes", "run", "build" ]
publicDir = "artifacts/petal-soft-wishes/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21891"
BASE_PATH = "/"
